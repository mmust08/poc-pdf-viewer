services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Read from .devcontainer/.env (docker-compose picks it up automatically).
        # Falls back to "latest" if the variable is not set in .env.
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
    volumes:
      # Mount the repo root into /workspace
      - ..:/workspace:cached
      # Isolate node_modules so Linux-compiled native addons (canvas)
      # are kept separate from the host Windows node_modules
      - node_modules:/workspace/node_modules
    ports:
      - "5173:5173"
    # Keep the container alive; devcontainer.json handles install + dev server
    command: sleep infinity
    working_dir: /workspace

volumes:
  node_modules:
